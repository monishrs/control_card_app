name: control_card_prototype
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Flutter default packages
  cupertino_icons: ^1.0.9
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  provider: ^6.1.5+1
  flutter_hooks: ^0.21.3+1

  # Utilities
  equatable: ^2.0.8
  get_it: ^9.2.1
  intl: ^0.20.2

  # Networking
  dio: ^5.9.2
  retrofit: ^4.9.2
  awesome_dio_interceptor: ^1.3.0
  internet_connection_checker: ^3.0.1

  # UI / UX
  cached_network_image: ^3.4.1
  fluttertoast: ^9.0.0
  flutter_spinkit: ^5.2.2
  toastification: ^3.2.0
  flutter_svg: ^2.2.4

  # Routing
  go_router: ^17.2.2

  # JSON & Freezed
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  change_app_package_name: ^1.5.0
  permission_handler: ^12.0.1
  image_picker: ^1.2.2
  google_fonts: ^8.1.0
  mobile_scanner: ^7.2.0
  dotted_border: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.14.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  retrofit_generator: ^10.2.5

  # Analysis
  flutter_lints: ^6.0.0


  # The following section is specific to Flutter.


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/inter/
    - assets/fonts/jetbrains_mono/
    - assets/fonts/hanken_grotesk/
    - assets/fonts/roboto_mono/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/inter_regular.ttf
          weight: 400
        - asset: assets/fonts/inter/inter_light.ttf
          weight: 300
        - asset: assets/fonts/inter/inter_medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/inter/inter_bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/jetbrains_mono/jetbrainsmono_regular.ttf
          weight: 400
        - asset: assets/fonts/jetbrains_mono/jetbrainsmono_light.ttf
          weight: 300
        - asset: assets/fonts/jetbrains_mono/jetbrainsmono_medium.ttf
          weight: 500
        - asset: assets/fonts/jetbrains_mono/jetbrainsmono_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/jetbrains_mono/jetbrainsmono_bold.ttf
          weight: 700

    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/hanken_grotesk/hanken_grotesk_regular.ttf
          weight: 400
        - asset: assets/fonts/hanken_grotesk/hanken_grotesk_light.ttf
          weight: 300
        - asset: assets/fonts/hanken_grotesk/hanken_grotesk_medium.ttf
          weight: 500
        - asset: assets/fonts/hanken_grotesk/hanken_grotesk_semiBold.ttf
          weight: 600
        - asset: assets/fonts/hanken_grotesk/hanken_grotesk_bold.ttf
          weight: 700

    - family: RobotoMono
      fonts:
        - asset: assets/fonts/roboto_mono/roboto_mono_regular.ttf
          weight: 400
        - asset: assets/fonts/roboto_mono/roboto_mono_light.ttf
          weight: 300
        - asset: assets/fonts/roboto_mono/roboto_mono_medium.ttf
          weight: 500
        - asset: assets/fonts/roboto_mono/roboto_mono_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/roboto_mono/roboto_mono_bold.ttf
          weight: 700

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
